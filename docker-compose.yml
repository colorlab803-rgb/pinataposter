# ══════════════════════════════════════════════════════════
# Docker Compose – PinataPoster (Oracle Cloud VM)
# ══════════════════════════════════════════════════════════
# Uso:
#   1. Copia .env.production como .env en el servidor
#   2. docker compose up -d --build
# ══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pinataposter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pinataposter}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pinataposter}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Next.js App ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pinataposter}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pinataposter}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_PACK_5: ${STRIPE_PRICE_PACK_5}
      STRIPE_PRICE_PACK_15: ${STRIPE_PRICE_PACK_15}
      STRIPE_PRICE_PACK_50: ${STRIPE_PRICE_PACK_50}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
    networks:
      - internal

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
