# ══════════════════════════════════════════════════════════
# Docker Compose – PinataPoster (Contabo VPS)
# ══════════════════════════════════════════════════════════
# Uso: docker compose up -d --build
# ══════════════════════════════════════════════════════════

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    volumes:
      - ./data:/app/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-PinataPoster2026!}
