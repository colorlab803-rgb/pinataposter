# ══════════════════════════════════════════════════════════
# Nginx reverse proxy – PinataPoster
# Proxy HTTP → Next.js container (puerto 3000)
# ══════════════════════════════════════════════════════════

upstream nextjs {
    server app:3000;
}

server {
    listen 80;
    server_name _;

    # ── Tamaño máximo de upload (imágenes grandes) ────────
    client_max_body_size 50M;

    # ── Headers de seguridad ──────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Proxy a Next.js ───────────────────────────────────
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts generosos para operaciones de upscale
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Archivos estáticos de Next.js (cache largo) ───────
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Favicons y archivos públicos ──────────────────────
    location /icons/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
