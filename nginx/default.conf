# ══════════════════════════════════════════════════════════
# Nginx reverse proxy – PinataPoster
# Proxy HTTP → Next.js container (puerto 3000)
# ══════════════════════════════════════════════════════════

upstream nextjs {
    server app:3000;
}

# ── Rate limiting zones ──────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=checkout:10m rate=2r/s;

# ── Ocultar versión de nginx ─────────────────────────────
server_tokens off;

# ── Redirect www → non-www ────────────────────────────────
server {
    listen 80;
    server_name www.pinataposter.com;
    return 301 https://pinataposter.com$request_uri;
}

server {
    listen 80;
    server_name pinataposter.com _;

    # ── Tamaño máximo de upload (imágenes grandes) ────────
    client_max_body_size 50M;

    # ── Headers de seguridad ──────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleusercontent.com https://*.replicate.delivery https://replicate.delivery; frame-src https://js.stripe.com https://accounts.google.com; connect-src 'self' https://api.stripe.com https://api.replicate.com https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self' https://accounts.google.com;" always;

    # ── Ocultar X-Powered-By de Next.js ──────────────────
    proxy_hide_header X-Powered-By;

    # ── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── API auth (rate limit estricto: 3 req/s) ──────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # ── Stripe checkout (rate limit estricto: 2 req/s) ───
    location /api/stripe/checkout {
        limit_req zone=checkout burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        proxy_read_timeout 30s;
    }

    # ── Stripe webhook (sin rate limit, Stripe lo necesita)
    location /api/stripe/webhook {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # ── APIs generales (rate limit: 10 req/s) ────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Proxy a Next.js (páginas) ─────────────────────────
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_hide_header X-Powered-By;

        # Timeouts generosos para operaciones de upscale
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Archivos estáticos de Next.js (cache largo) ───────
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_hide_header X-Powered-By;
    }

    # ── Favicons y archivos públicos ──────────────────────
    location /icons/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
        proxy_hide_header X-Powered-By;
    }
}
